name: Daily Market Data Collector

on:
  schedule:
    # ① 台灣 16:00（UTC 08:00）— TWSE 盤後確保更新完畢（收盤後約 2.5 小時）
    - cron: '0 8 * * 1-5'
    # ② 台灣 17:00（UTC 09:00）— FinMind 法人/選擇權/融資券更新完畢
    - cron: '0 9 * * 1-5'
  workflow_dispatch:  # 允許手動觸發（不帶 mode 則全收）

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install @supabase/supabase-js node-fetch

      - name: Collect and store market data
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          VERCEL_API_BASE:      ${{ secrets.VERCEL_API_BASE }}
          COLLECT_MODE: ${{ github.event.schedule == '0 8 * * 1-5' && 'twse' || github.event.schedule == '0 9 * * 1-5' && 'finmind' || 'all' }}
        run: node .github/scripts/collect_market_data.js
